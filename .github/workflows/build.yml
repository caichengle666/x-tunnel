name: Build & Release

on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GOPROXY: https://goproxy.cn,direct

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go mod download
      - name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ARTIFACT="x-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}"
          DIST="dist/$ARTIFACT"
          EXT=$([ "${{ matrix.goos }}" = "windows" ] && echo ".exe" || echo "")
          mkdir -p "$DIST"
          go build -ldflags "-s -w" -o "$DIST/x-tunnel$EXT" .
          if [ "${{ matrix.goos }}" = "windows" ] && [ "${{ matrix.goarch }}" = "amd64" ]; then
            sudo apt-get update
            sudo apt-get install -y zip unzip
            curl -fsSL -o /tmp/wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
            unzip -q /tmp/wintun.zip -d /tmp/wintun
            WINTUN_DLL=$(find /tmp/wintun -path '*/amd64/wintun.dll' -print -quit)
            if [ -z "$WINTUN_DLL" ]; then
              echo "wintun.dll not found in Wintun package" >&2
              exit 1
            fi
            cp "$WINTUN_DLL" "$DIST/wintun.dll"
          fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd dist && zip -qr "$ARTIFACT.zip" "$ARTIFACT")
          else
            tar -C dist -czf "dist/$ARTIFACT.tar.gz" "$ARTIFACT"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: x-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/x-tunnel-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/x-tunnel
          tags: |
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
