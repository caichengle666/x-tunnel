# =============================================================================
# x-tunnel Server - Docker Compose
# 支持 Cloudflare Tunnel：一个端口同时提供 WebSocket 和 Web 管理面板
#
# 使用方法:
#   1. 设置环境变量 TOKEN 和 CIDR
#   2. docker compose up -d
#
# 客户端连接: wss://your-domain.com/tunnel
# Web 面板:    https://your-domain.com/
# =============================================================================

services:
  tunnel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xtunnel
    restart: always
    ports:
      - "8090:8090"
    environment:
      - TOKEN=
      - CIDR=0.0.0.0/0
    command:
      - -l
      - ws://0.0.0.0:8090/tunnel
      - -web
      - :8090
      - -token
      - ${TOKEN}
      - -cidr
      - ${CIDR}
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8090"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
