# x-tunnel Server - Docker Compose
# One port serves both WebSocket tunnel traffic and the server status page.
#
# Required:
#   TOKEN=your-secret docker compose up -d
#
# Optional:
#   CIDR=0.0.0.0/0
#   PORT=8090

services:
  tunnel:
    image: ghcr.io/caichengle666/x-tunnel:latest
    # For local development builds, replace image with:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: xtunnel
    restart: always
    ports:
      - "${PORT:-8090}:8090"
    command:
      - -l
      - ws://0.0.0.0:8090/tunnel
      - -web
      - :8090
      - -token
      - ${TOKEN:?TOKEN is required}
      - -cidr
      - ${CIDR:-0.0.0.0/0}
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8090"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
